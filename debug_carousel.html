<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Carousel - Klik untuk Slide</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #fffacd 100%);
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            color: #FF1493;
            margin-bottom: 1rem;
            text-align: center;
        }

        .status {
            background: #fff;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .status p {
            color: #333;
            margin: 0.5rem 0;
        }

        .carousel-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .carousel-wrapper {
            flex: 1;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 12px 24px rgba(255, 20, 147, 0.2);
            background: white;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .carousel {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .carousel-item {
            position: absolute;
            width: 100%;
            height: 100%;
            padding: 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
            top: 0;
            left: 0;
        }

        .carousel-item.active {
            opacity: 1;
            z-index: 10;
        }

        .carousel-item img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 1rem;
        }

        .carousel-item h3 {
            font-size: 1.5rem;
            color: #FF1493;
            margin-bottom: 0.5rem;
        }

        .carousel-item p {
            font-size: 1.2rem;
            color: #FF8C00;
            font-weight: bold;
        }

        .carousel-btn {
            background: linear-gradient(135deg, #FF69B4 0%, #FF1493 100%);
            color: white;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 6px 12px rgba(255, 20, 147, 0.3);
        }

        .carousel-btn:active {
            background: linear-gradient(135deg, #FF1493 0%, #FF69B4 100%);
            transform: scale(0.95);
        }

        .carousel-btn:hover {
            transform: scale(1.15);
        }

        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: #FFD700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background-color: #FF1493;
            transform: scale(1.3);
        }

        .dot:hover {
            transform: scale(1.2);
        }

        .log {
            background: #f0f0f0;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 2rem;
            font-family: monospace;
            font-size: 0.9rem;
            max-height: 200px;
            overflow-y: auto;
        }

        .log-item {
            color: #333;
            margin: 0.3rem 0;
            border-bottom: 1px solid #ddd;
            padding: 0.3rem 0;
        }

        .log-item.success {
            color: green;
            font-weight: bold;
        }

        .log-item.error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎠 Debug Carousel - Klik Tombol untuk Test</h1>

        <div class="status">
            <p><strong>Status:</strong> <span id="status">Memuat...</span></p>
            <p><strong>Slide Sekarang:</strong> <span id="current">-</span></p>
            <p><strong>Total Produk:</strong> <span id="total">-</span></p>
        </div>

        <div class="carousel-container">
            <button class="carousel-btn prev" onclick="testPrevSlide()">❮</button>
            <div class="carousel-wrapper">
                <div class="carousel">
                    <div class="carousel-item active">
                        <img src="https://via.placeholder.com/200/FF69B4/FFFFFF?text=Slide+1" alt="Slide 1">
                        <h3>Produk 1</h3>
                        <p>Rp 150.000</p>
                    </div>
                    <div class="carousel-item">
                        <img src="https://via.placeholder.com/200/FFD700/000000?text=Slide+2" alt="Slide 2">
                        <h3>Produk 2</h3>
                        <p>Rp 50.000</p>
                    </div>
                    <div class="carousel-item">
                        <img src="https://via.placeholder.com/200/FF1493/FFFFFF?text=Slide+3" alt="Slide 3">
                        <h3>Produk 3</h3>
                        <p>Rp 75.000</p>
                    </div>
                    <div class="carousel-item">
                        <img src="https://via.placeholder.com/200/FFFF00/000000?text=Slide+4" alt="Slide 4">
                        <h3>Produk 4</h3>
                        <p>Rp 200.000</p>
                    </div>
                </div>
            </div>
            <button class="carousel-btn next" onclick="testNextSlide()">❯</button>
        </div>

        <div class="carousel-dots">
            <span class="dot active" onclick="testCurrentSlide(0)"></span>
            <span class="dot" onclick="testCurrentSlide(1)"></span>
            <span class="dot" onclick="testCurrentSlide(2)"></span>
            <span class="dot" onclick="testCurrentSlide(3)"></span>
        </div>

        <div class="log">
            <div class="log-item success">✓ Carousel Debug Dimulai</div>
            <div id="logContainer"></div>
        </div>
    </div>

    <script>
        let currentSlideIndex = 0;
        const carouselItems = document.querySelectorAll('.carousel-item');
        const dots = document.querySelectorAll('.dot');
        let autoInterval = null;

        function addLog(message, type = 'normal') {
            const log = document.getElementById('logContainer');
            const item = document.createElement('div');
            item.className = 'log-item ' + type;
            const time = new Date().toLocaleTimeString();
            item.textContent = `[${time}] ${message}`;
            log.appendChild(item);
            log.scrollTop = log.scrollHeight;
            console.log(message);
        }

        function updateStatus() {
            document.getElementById('current').textContent = currentSlideIndex;
            document.getElementById('total').textContent = carouselItems.length;
            document.getElementById('status').textContent = '✓ Siap';
        }

        function showSlide(n) {
            currentSlideIndex = n;
            
            // Hapus active dari semua
            carouselItems.forEach(item => item.classList.remove('active'));
            dots.forEach(dot => dot.classList.remove('active'));
            
            // Set active ke slide baru
            carouselItems[currentSlideIndex].classList.add('active');
            dots[currentSlideIndex].classList.add('active');
            
            updateStatus();
            addLog(`Slide dipilih: ${currentSlideIndex + 1}/${carouselItems.length}`, 'success');
        }

        function testNextSlide() {
            clearInterval(autoInterval);
            currentSlideIndex = (currentSlideIndex + 1) % carouselItems.length;
            showSlide(currentSlideIndex);
            addLog('Klik tombol NEXT ❯');
        }

        function testPrevSlide() {
            clearInterval(autoInterval);
            currentSlideIndex = (currentSlideIndex - 1 + carouselItems.length) % carouselItems.length;
            showSlide(currentSlideIndex);
            addLog('Klik tombol PREV ❮');
        }

        function testCurrentSlide(n) {
            clearInterval(autoInterval);
            showSlide(n);
            addLog(`Klik dot ke-${n + 1}`);
        }

        // Initialize
        addLog(`Total carousel items: ${carouselItems.length}`);
        addLog('Carousel siap digunakan');
        updateStatus();
        
        if (carouselItems.length === 0) {
            addLog('PERHATIAN: Tidak ada carousel items!', 'error');
        }
    </script>
</body>
</html>
